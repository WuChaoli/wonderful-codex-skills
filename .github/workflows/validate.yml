name: Validate marketplace

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-python:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Test cross-platform Skill tooling
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Validate publisher Plugin
        run: python plugins/publish-codex-skill/skills/publish-codex-skill/scripts/validate_skill.py plugins/publish-codex-skill --plugin --repository-root .

  validate-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Parse PowerShell
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          $script = 'plugins/fix-codex-retry-loop/skills/fix-codex-retry-loop/scripts/fix_codex_proxy.ps1'
          [System.Management.Automation.Language.Parser]::ParseFile($script, [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) { $errors; exit 1 }

      - name: Validate repository
        shell: pwsh
        run: pwsh -NoProfile -File tests/validate_repository.ps1

      - name: Test proxy script
        shell: pwsh
        run: pwsh -NoProfile -File tests/fix_codex_proxy.Tests.ps1

      - name: Test skill contract
        shell: pwsh
        run: pwsh -NoProfile -File tests/skill_contract.Tests.ps1
