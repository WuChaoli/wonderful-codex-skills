name: Validate marketplace

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Parse PowerShell
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          $script = 'plugins/fix-codex-retry-loop/skills/fix-codex-retry-loop/scripts/fix_codex_proxy.ps1'
          [System.Management.Automation.Language.Parser]::ParseFile($script, [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) { $errors; exit 1 }

      - name: Validate repository
        shell: pwsh
        run: pwsh -NoProfile -File tests/validate_repository.ps1

      - name: Test proxy script
        shell: pwsh
        run: pwsh -NoProfile -File tests/fix_codex_proxy.Tests.ps1

      - name: Test skill contract
        shell: pwsh
        run: pwsh -NoProfile -File tests/skill_contract.Tests.ps1
